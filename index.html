<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미장(US Stock) 전술 레이더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #111827; color: #d1d5db; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(31, 41, 55, 0.8); backdrop-filter: blur(10px); border: 1px solid #374151; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-extrabold text-blue-400 mb-2"><i class="fas fa-globe-americas"></i> 1004MAS US STOCK RADAR</h1>
    <p class="text-gray-400 mb-8">나스닥(NASDAQ) 및 S&P500 빅테크 AI 감시망</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-xl">
            <h2 class="text-xl font-bold text-white mb-4">현재 주도주 (Megatech Gainers)</h2>
            <div class="flex justify-between items-center bg-black/50 p-4 rounded-lg">
                <span class="text-2xl font-bold text-white">NVDA</span>
                <span class="text-2xl font-black text-green-400">+5.12%</span>
            </div>
            <p class="text-right text-sm text-gray-500 mt-2">Yahoo Finance Ticker 감지</p>
        </div>
        
        <div class="glass p-6 rounded-xl border-l-4 border-blue-400">
            <h2 class="text-lg font-bold text-white mb-2"><i class="fas fa-brain"></i> 제갈량 판결 (Verdicts)</h2>
            <p class="text-gray-300 text-sm leading-relaxed">
                "차세대 블랙웰(Blackwell) 칩 양산 지연 우려 완화 및 기관 투자자 수급 폭발로 인한 건전 상승. 보유 포지션 권장."
            </p>
        </div>
    </div>

    <div class="mt-8 text-center"><a href="https://www.1004mas.com" class="text-blue-500 hover:text-white underline">포탈(Portal) 복귀</a></div>
</body>
</html>
